info:
  name: get projects
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/{{API}}/project.project/search_read"
  headers:
    - name: X-Odoo-Database
      value: "{{DATABASE}}"
      disabled: true
    - name: Host
      value: "{{HOST}}"
    - name: Content-Type
      value: application/json; charset=utf-8
    - name: User-Agent
      value: mysoftware python-requests/2.25.1
  body:
    type: json
    data: |-
      {
        "domain": [
          ["name", "ilike", "Digitale"]
        ],
        "fields": [
          "id",
          "name"
        ],
        "order": "id desc"
      }
  auth:
    type: bearer
    token: "{{API_KEY}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
