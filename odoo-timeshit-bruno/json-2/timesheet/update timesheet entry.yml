info:
  name: update timesheet entry
  type: http
  seq: 4

http:
  method: POST
  url: "{{BASE_URL}}/{{API}}/account.analytic.line/write"
  headers:
    - name: X-Odoo-Database
      value: "{{DATABASE}}"
      disabled: true
    - name: Host
      value: "{{HOST}}"
    - name: Content-Type
      value: application/json; charset=utf-8
    - name: User-Agent
      value: mysoftware python-requests/2.25.1
  body:
    type: json
    data: |-
      {
            "ids": [{{ID}}],
            "vals": {
              "name": "Updated description",
              "unit_amount": 2.5
            }
          }
  auth:
    type: bearer
    token: "{{API_KEY}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
