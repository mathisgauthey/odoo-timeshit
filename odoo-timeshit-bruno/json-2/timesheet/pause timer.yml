info:
  name: pause timer
  type: http
  seq: 7

http:
  method: POST
  url: "{{BASE_URL}}/{{API}}/account.analytic.line/action_timer_pause"
  headers:
    - name: X-Odoo-Database
      value: "{{DATABASE}}"
      disabled: true
    - name: Host
      value: "{{HOST}}"
    - name: Content-Type
      value: application/json; charset=utf-8
    - name: User-Agent
      value: mysoftware python-requests/2.25.1
  body:
    type: json
    data: |-
      {
        "ids": [
          {{ID}}
        ]
      }
  auth:
    type: bearer
    token: "{{API_KEY}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
