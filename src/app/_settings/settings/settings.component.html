<div class="flex flex-col h-full">
  <!-- Header -->
  <header class="h-12 shrink-0 flex items-center gap-2 px-3 bg-[var(--surface-0)] border-b border-[var(--surface-border)]">
    <button (click)="goBack.emit()"
            class="p-2 -ml-2 rounded-lg text-[var(--text-color-secondary)] hover:bg-[var(--surface-100)] transition-colors"
            title="Back">
      <i class="pi pi-arrow-left"></i>
    </button>
    <span class="text-lg font-semibold text-[var(--text-color)]">Settings</span>
  </header>

  <div class="flex-1 overflow-y-auto p-3 flex flex-col gap-4">
    <!-- Custom fields -->
    <app-custom-fields-settings/>
    <!-- Azure DevOps integration -->
    <hr class="border-t border-[var(--surface-border)] my-1"/>
    <app-azure-settings/>
  </div>
</div>
